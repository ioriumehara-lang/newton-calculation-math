<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Damped Newton Method Visualizer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

h1{
    text-align:center;
}

.controls{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

input{
    width:70px;
    margin-right:10px;
}

button{
    padding:8px 15px;
    cursor:pointer;
}

canvas{
    background:white;
    border-radius:10px;
    padding:10px;
    margin-top:20px;
    cursor:grab;
}

canvas:active{
    cursor:grabbing;
}

#info{
    margin-top:10px;
    font-size:18px;
}

#secretBox{

    display:none;

    background:black;
    color:#00ff88;

    padding:15px;

    border-radius:10px;

    margin-bottom:20px;

    font-family:monospace;
}

</style>
</head>

<body>

<div id="secretBox">

<b>Hidden Update Log</b>

<br><br>

v1.3 Update

<ul>
<li>初期値範囲を極大・極小から自動計算</li>
<li>グラフ範囲を初期値に応じて自動調整</li>
<li>Rキーでランダム再抽選</li>
<li>Space連打向けに視認性改善</li>
<li>隠しコマンド追加</li>
</ul>

</div>

<h1>Damped Newton Method Visualizer</h1>

<div class="controls">

<p>
ax³ + bx² + cx + d = 0
</p>

<label>a</label>
<input type="number" id="a" value="1">

<label>b</label>
<input type="number" id="b" value="-2">

<label>c</label>
<input type="number" id="c" value="-5">

<label>d</label>
<input type="number" id="d" value="6">

<button onclick="startNewton()">
Start
</button>

<p>
Space → 次のステップ
</p>

<p>
R → ランダム初期値を再抽選
</p>

<p id="info"></p>

</div>

<h2>Damped Newton Animation</h2>
<canvas id="chart1" width="1200" height="600"></canvas>

<h2>Convergence Map</h2>
<canvas id="chart2" width="1200" height="400"></canvas>

<script>

Chart.register(ChartZoom);

let chart1;
let chart2;

let currentX;
let currentStep = 0;

let A,B,C,D;

let pathData = [];

const LAMBDA = 0.45;

let BASE_X = 10;
let BASE_Y = 30;

let leftBound = -10;
let rightBound = 10;



// =========================
// 隠しコマンド
// =========================

let secret = "";
const target = "umehara";

document.addEventListener("keydown",(e)=>{

    let k = e.key.toLowerCase();

    if(k.length===1){

        secret += k;

        if(secret.length > target.length){

            secret =
                secret.slice(
                    secret.length-target.length
                );
        }

        if(secret===target){

            document
            .getElementById("secretBox")
            .style.display = "block";
        }
    }
});



// =========================
// 関数
// =========================

function f(x,a,b,c,d){

    return a*x**3 + b*x**2 + c*x + d;
}

function df(x,a,b,c){

    return 3*a*x**2 + 2*b*x + c;
}



// =========================
// Newton
// =========================

function newton(start,a,b,c,d){

    let x = start;

    for(let i=0;i<300;i++){

        let slope = df(x,a,b,c);

        if(Math.abs(slope)<1e-10){
            return null;
        }

        let newX =
            x -
            LAMBDA * f(x,a,b,c,d)/slope;

        if(Math.abs(newX-x)<1e-7){
            return newX;
        }

        x = newX;
    }

    return null;
}



// =========================
// Zoom
// =========================

function zoomOptions(){

    return {

        pan:{
            enabled:true,
            mode:'xy'
        },

        zoom:{

            wheel:{
                enabled:true
            },

            pinch:{
                enabled:true
            },

            mode:'xy'
        }
    };
}



// =========================
// Start
// =========================

function startNewton(){

    A = parseFloat(document.getElementById("a").value);
    B = parseFloat(document.getElementById("b").value);
    C = parseFloat(document.getElementById("c").value);
    D = parseFloat(document.getElementById("d").value);



    // 極値

    let discriminant =
        4*B*B - 12*A*C;



    leftBound = -40;
    rightBound = 40;



    if(discriminant > 0){

        let critical1 =
            (
                -2*B -
                Math.sqrt(discriminant)
            ) / (6*A);

        let critical2 =
            (
                -2*B +
                Math.sqrt(discriminant)
            ) / (6*A);

        let minCritical =
            Math.min(
                critical1,
                critical2
            );

        let maxCritical =
            Math.max(
                critical1,
                critical2
            );

        let center =
            (
                minCritical +
                maxCritical
            ) / 2;

        let spread =
            (
                maxCritical -
                minCritical
            );

        leftBound =
            center - spread;

        rightBound =
            center + spread;
    }



    // 初期値

    currentX =
        Math.random() *
        (rightBound-leftBound)
        + leftBound;



    // 表示範囲を自動調整

    BASE_X =
        Math.max(
            6,
            Math.abs(leftBound),
            Math.abs(rightBound)
        ) * 1.8;

    BASE_Y =
        BASE_X * 3;



    currentStep = 0;

    pathData = [];

    drawMainGraph();

    drawConvergenceMap();

    document.getElementById("info").innerHTML =
    `
    初期値:
    ${currentX.toFixed(6)}

    <br><br>

    初期値範囲:
    [${leftBound.toFixed(3)},
    ${rightBound.toFixed(3)}]

    <br><br>

    λ:
    ${LAMBDA}
    `;
}



// =========================
// メイングラフ
// =========================

function drawMainGraph(){

    let graphData = [];

    for(let X=-BASE_X; X<=BASE_X; X+=0.03){

        let Y = f(X,A,B,C,D);

        if(Math.abs(Y)<1000){

            graphData.push({
                x:X,
                y:Y
            });
        }
    }

    let xAxis = [
        {x:-1000,y:0},
        {x:1000,y:0}
    ];

    let yAxis = [
        {x:0,y:-1000},
        {x:0,y:1000}
    ];

    if(chart1){
        chart1.destroy();
    }

    chart1 = new Chart(
        document.getElementById("chart1"),
        {

        type:'scatter',

        data:{
            datasets:[

                {
                    data:graphData,
                    borderColor:'blue',
                    showLine:true,
                    pointRadius:0,
                    borderWidth:2
                },

                {
                    data:xAxis,
                    borderColor:'black',
                    showLine:true,
                    pointRadius:0,
                    borderWidth:5
                },

                {
                    data:yAxis,
                    borderColor:'black',
                    showLine:true,
                    pointRadius:0,
                    borderWidth:5
                },

                {
                    data:pathData,
                    borderColor:'red',
                    backgroundColor:'red',
                    showLine:true,
                    pointRadius:3,
                    borderWidth:2
                }

            ]
        },

        options:{

            animation:false,

            plugins:{

                legend:{
                    display:false
                },

                zoom:zoomOptions()
            },

            scales:{

                x:{
                    min:-BASE_X,
                    max:BASE_X
                },

                y:{
                    min:-BASE_Y,
                    max:BASE_Y
                }
            }
        }
    });
}



// =========================
// Convergence Map
// =========================

function drawConvergenceMap(){

    let roots = [];

    function classify(r){

        for(let x of roots){

            if(Math.abs(x-r)<0.05){
                return x;
            }
        }

        roots.push(r);

        return r;
    }

    let datasetsMap = {};

    for(let i=-1500;i<=1500;i++){

        let start = i * 0.03;

        let result =
            newton(start,A,B,C,D);

        if(result===null || !isFinite(result)){
            continue;
        }

        let root = classify(result);

        if(!datasetsMap[root]){
            datasetsMap[root]=[];
        }

        datasetsMap[root].push({
            x:start,
            y:root
        });
    }

    let colors = [
        "red",
        "blue",
        "green",
        "purple",
        "orange"
    ];

    let datasets = [];

    let index = 0;

    for(let root in datasetsMap){

        datasets.push({

            data:datasetsMap[root],

            showLine:false,

            pointRadius:2,

            borderColor:
                colors[index%colors.length],

            backgroundColor:
                colors[index%colors.length]
        });

        index++;
    }

    if(chart2){
        chart2.destroy();
    }

    chart2 = new Chart(
        document.getElementById("chart2"),
        {

        type:'scatter',

        data:{
            datasets:datasets
        },

        options:{

            animation:false,

            plugins:{

                legend:{
                    display:false
                },

                zoom:zoomOptions()
            },

            scales:{

                x:{
                    min:leftBound*2,
                    max:rightBound*2
                },

                y:{
                    min:-BASE_X,
                    max:BASE_X
                }
            }
        }
    });
}



// =========================
// Next Step
// =========================

function nextStep(){

    let y = f(currentX,A,B,C,D);

    let slope = df(currentX,A,B,C);

    if(Math.abs(slope)<1e-10){
        return;
    }

    let newX =
        currentX -
        LAMBDA * y/slope;

    pathData.push({
        x:currentX,
        y:y
    });

    pathData.push({
        x:newX,
        y:0
    });

    chart1.update();

    currentStep++;

    document.getElementById("info").innerHTML =
    `
    Step:
    ${currentStep}

    <br><br>

    現在のx:
    ${currentX.toFixed(10)}

    <br><br>

    次のx:
    ${newX.toFixed(10)}

    <br><br>

    f(x):
    ${y.toFixed(10)}
    `;

    currentX = newX;
}



// =========================
// Key
// =========================

document.addEventListener(
    "keydown",
    function(event){

    if(event.code==="Space"){

        event.preventDefault();

        nextStep();
    }

    if(event.code==="KeyR"){

        event.preventDefault();

        startNewton();
    }
});



startNewton();

</script>

</body>
</html>
