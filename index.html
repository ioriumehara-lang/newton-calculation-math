<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Newton Method Visualizer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

h1{
    text-align:center;
}

.panel{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input{
    width:80px;
    margin-right:10px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

canvas{
    background:white;
    border-radius:12px;
    padding:10px;
    cursor:grab;
}

canvas:active{
    cursor:grabbing;
}

#info{
    margin-top:20px;
    font-size:18px;
    line-height:1.8;
}

</style>
</head>

<body>

<h1>Newton Method Visualizer</h1>

<div class="panel">

<p>
方程式：
</p>

<p>
ax³ + bx² + cx + d = 0
</p>

<label>a</label>
<input type="number" id="a" value="1">

<label>b</label>
<input type="number" id="b" value="-2">

<label>c</label>
<input type="number" id="c" value="-5">

<label>d</label>
<input type="number" id="d" value="6">

<button onclick="generate()">
生成
</button>

<div id="info"></div>

</div>

<canvas id="chart" width="1200" height="900"></canvas>

<script>

Chart.register(ChartZoom);

let chart;

let steps = [];

let currentStep = 0;

let graphRange = 30;



// =========================
// 数学
// =========================

function f(x,a,b,c,d){

    return (
        a*x*x*x +
        b*x*x +
        c*x +
        d
    );
}

function df(x,a,b,c){

    return (
        3*a*x*x +
        2*b*x +
        c
    );
}



// =========================
// ニュートン法
// =========================

function buildNewtonSteps(start,a,b,c,d){

    let arr = [];

    let x = start;

    for(let i=0;i<25;i++){

        let y =
            f(x,a,b,c,d);

        let slope =
            df(x,a,b,c);

        if(Math.abs(slope)<1e-10){
            break;
        }

        let next =
            x - y/slope;

        arr.push({

            x:x,
            y:y,
            next:next,
            slope:slope
        });

        if(Math.abs(next-x)<0.000001){
            break;
        }

        x = next;
    }

    return arr;
}



// =========================
// 生成
// =========================

function generate(){

    let a =
        parseFloat(
            document.getElementById("a").value
        );

    let b =
        parseFloat(
            document.getElementById("b").value
        );

    let c =
        parseFloat(
            document.getElementById("c").value
        );

    let d =
        parseFloat(
            document.getElementById("d").value
        );



    // 初期値を広く

    let start =
        Math.random()*80 - 40;



    steps =
        buildNewtonSteps(
            start,
            a,b,c,d
        );

    currentStep = 0;

    draw(a,b,c,d);
}



// =========================
// 描画
// =========================

function draw(a,b,c,d){

    let datasets = [];



    // 関数グラフ

    let curve = [];

    for(let x=-graphRange;x<=graphRange;x+=0.05){

        let y =
            f(x,a,b,c,d);

        if(Math.abs(y)<1000){

            curve.push({
                x:x,
                y:y
            });
        }
    }

    datasets.push({

        label:"f(x)",

        data:curve,

        borderColor:"blue",

        borderWidth:3,

        showLine:true,

        pointRadius:0
    });



    // x軸

    datasets.push({

        data:[
            {x:-1000,y:0},
            {x:1000,y:0}
        ],

        borderColor:"black",

        borderWidth:4,

        showLine:true,

        pointRadius:0
    });



    // y軸

    datasets.push({

        data:[
            {x:0,y:-1000},
            {x:0,y:1000}
        ],

        borderColor:"black",

        borderWidth:4,

        showLine:true,

        pointRadius:0
    });



    // =========================
    // ここが重要
    // 今までの全ステップを描画
    // =========================

    for(let i=0;i<=currentStep;i++){

        let s = steps[i];



        // 接線

        let tangent = [];

        for(let x=s.x-15;x<=s.x+15;x+=0.1){

            let y =
                s.slope*(x-s.x)+s.y;

            if(Math.abs(y)<1000){

                tangent.push({
                    x:x,
                    y:y
                });
            }
        }

        datasets.push({

            label:
                i===currentStep
                ? "Current Tangent"
                : "Past Tangent",

            data:tangent,

            borderColor:
                i===currentStep
                ? "red"
                : "rgba(255,0,0,0.25)",

            borderWidth:
                i===currentStep
                ? 3
                : 2,

            showLine:true,

            pointRadius:0
        });



        // 現在点

        datasets.push({

            label:
                i===currentStep
                ? "Current Point"
                : "Past Point",

            data:[
                {
                    x:s.x,
                    y:s.y
                }
            ],

            backgroundColor:
                i===currentStep
                ? "red"
                : "rgba(255,0,0,0.4)",

            pointRadius:
                i===currentStep
                ? 7
                : 5
        });



        // x軸への移動

        datasets.push({

            label:
                i===currentStep
                ? "Current Move"
                : "Past Move",

            data:[
                {
                    x:s.x,
                    y:s.y
                },
                {
                    x:s.next,
                    y:0
                }
            ],

            borderColor:
                i===currentStep
                ? "green"
                : "rgba(0,150,0,0.3)",

            borderDash:[10,10],

            borderWidth:
                i===currentStep
                ? 3
                : 2,

            showLine:true,

            pointRadius:0
        });



        // x軸上の点

        datasets.push({

            data:[
                {
                    x:s.next,
                    y:0
                }
            ],

            backgroundColor:
                i===currentStep
                ? "green"
                : "rgba(0,150,0,0.4)",

            pointRadius:
                i===currentStep
                ? 6
                : 4
        });
    }



    if(chart){
        chart.destroy();
    }

    const ctx =
        document.getElementById("chart");

    chart = new Chart(ctx,{

        type:"scatter",

        data:{
            datasets:datasets
        },

        options:{

            responsive:false,

            animation:false,

            aspectRatio:1.3,

            plugins:{

                legend:{
                    display:false
                },

                zoom:{

                    pan:{
                        enabled:true,
                        mode:'xy'
                    },

                    zoom:{

                        wheel:{
                            enabled:true,
                            speed:0.03
                        },

                        pinch:{
                            enabled:true
                        },

                        mode:'xy'
                    }
                }
            },

            scales:{

                x:{
                    type:"linear",

                    min:-graphRange,
                    max:graphRange,

                    ticks:{
                        stepSize:5
                    }
                },

                y:{
                    min:-graphRange,
                    max:graphRange,

                    ticks:{
                        stepSize:5
                    }
                }
            }
        }
    });



    // 情報

    let text = "";

    if(currentStep < steps.length){

        let s =
            steps[currentStep];

        text =
        `
        <b>現在のステップ:</b>
        ${currentStep+1}

        <br><br>

        <b>現在の x:</b>
        ${s.x.toFixed(6)}

        <br><br>

        <b>f(x):</b>
        ${s.y.toFixed(6)}

        <br><br>

        <b>次の近似:</b>
        ${s.next.toFixed(6)}

        <br><br>

        スペースキーで次へ
        `;
    }

    document.getElementById("info").innerHTML =
        text;
}



// =========================
// スペースキー
// =========================

document.addEventListener("keydown",(e)=>{

    if(e.code==="Space"){

        e.preventDefault();

        if(currentStep < steps.length-1){

            currentStep++;

            let a =
                parseFloat(
                    document.getElementById("a").value
                );

            let b =
                parseFloat(
                    document.getElementById("b").value
                );

            let c =
                parseFloat(
                    document.getElementById("c").value
                );

            let d =
                parseFloat(
                    document.getElementById("d").value
                );

            draw(a,b,c,d);
        }
    }
});



generate();

</script>

</body>
</html>
